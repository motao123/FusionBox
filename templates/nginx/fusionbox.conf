# FusionBox Nginx Template
# Optimized Nginx configuration for proxy + web

# Main fusionbox nginx config - include this from nginx.conf
# Add to http block:
#   include /etc/nginx/fusionbox/*.conf;

# Gzip
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

# Security headers
add_header X-Content-Type-Options nosniff always;
add_header X-Frame-Options SAMEORIGIN always;
add_header X-XSS-Protection "1; mode=block" always;

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=fusionbox:10m rate=10r/s;

# Cache zone
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=fusionbox_cache:10m max_size=1g inactive=60m use_temp_path=off;
